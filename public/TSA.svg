<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgTSA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3EEFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8D8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgTSA)" rx="20"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="#7C3AED" opacity="0.08"/>
  <circle cx="520" cy="320" r="80" fill="#A855F7" opacity="0.08"/>
  <circle cx="530" cy="70" r="40" fill="#6366F1" opacity="0.06"/>
  <!-- Infinity symbol (neurodiversity) -->
  <path d="M180,200 C180,155 215,130 255,130 C295,130 330,155 300,200 C270,245 305,270 345,270 C385,270 420,245 420,200 C420,155 385,130 345,130 C305,130 270,155 300,200 C330,245 295,270 255,270 C215,270 180,245 180,200 Z"
    fill="none" stroke="url(#infGrad)" stroke-width="28" stroke-linecap="round"/>
  <!-- Small colored dots around -->
  <circle cx="170" cy="140" r="10" fill="#7C3AED" opacity="0.6"/>
  <circle cx="430" cy="140" r="8" fill="#A855F7" opacity="0.5"/>
  <circle cx="160" cy="260" r="7" fill="#6366F1" opacity="0.5"/>
  <circle cx="440" cy="260" r="10" fill="#7C3AED" opacity="0.6"/>
  <circle cx="300" cy="105" r="6" fill="#A855F7" opacity="0.4"/>
  <!-- Label -->
  <text x="300" y="330" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#5B21B6" text-anchor="middle" opacity="0.9">Troubles du Spectre de l'Autisme</text>
</svg>

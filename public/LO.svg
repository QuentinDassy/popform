<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bgLO" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F8F0"/>
      <stop offset="100%" style="stop-color:#C5EDD8"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDDBB4"/>
      <stop offset="100%" style="stop-color:#F5C690"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bgLO)"/>
  <!-- Decorative bg circles -->
  <circle cx="520" cy="60" r="90" fill="#2A9D6E" opacity="0.07"/>
  <circle cx="80" cy="300" r="70" fill="#2A9D6E" opacity="0.07"/>

  <!-- Face silhouette -->
  <ellipse cx="220" cy="185" rx="75" ry="90" fill="url(#faceGrad)" stroke="#E8A86A" stroke-width="1.5"/>
  <!-- Hair -->
  <ellipse cx="220" cy="118" rx="72" ry="38" fill="#5D3A1A"/>
  <rect x="150" y="118" width="18" height="50" rx="9" fill="#5D3A1A"/>
  <rect x="282" y="118" width="18" height="45" rx="9" fill="#5D3A1A"/>
  <!-- Eyes -->
  <ellipse cx="198" cy="175" rx="10" ry="11" fill="white"/>
  <ellipse cx="242" cy="175" rx="10" ry="11" fill="white"/>
  <circle cx="200" cy="176" r="6" fill="#3D2200"/>
  <circle cx="244" cy="176" r="6" fill="#3D2200"/>
  <circle cx="202" cy="174" r="2" fill="white"/>
  <circle cx="246" cy="174" r="2" fill="white"/>
  <!-- Smile / mouth open -->
  <path d="M195,210 Q220,232 245,210" fill="none" stroke="#C0725A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M198,212 Q220,228 242,212 Q220,240 198,212 Z" fill="#D42B2B" opacity="0.7"/>
  <ellipse cx="220" cy="225" rx="18" ry="8" fill="#8B1A1A" opacity="0.4"/>
  <!-- Nose -->
  <path d="M215,195 Q220,205 225,195" fill="none" stroke="#C09070" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Speech waves -->
  <path d="M310,155 Q330,140 350,155 Q370,170 390,155 Q410,140 430,155" fill="none" stroke="#2A9D6E" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M310,180 Q340,160 370,180 Q400,200 430,180 Q460,160 490,180" fill="none" stroke="#2A9D6E" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M310,205 Q350,182 390,205 Q430,228 470,205 Q510,182 540,205" fill="none" stroke="#2A9D6E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Sound dots -->
  <circle cx="320" cy="155" r="5" fill="#2A9D6E" opacity="0.8"/>
  <circle cx="360" cy="162" r="4" fill="#2A9D6E" opacity="0.6"/>
  <circle cx="400" cy="155" r="5" fill="#2A9D6E" opacity="0.8"/>
  <circle cx="440" cy="162" r="4" fill="#2A9D6E" opacity="0.6"/>
  <circle cx="480" cy="155" r="5" fill="#2A9D6E" opacity="0.8"/>

  <!-- "ABC" letters floating -->
  <text x="330" y="240" font-family="Georgia, serif" font-size="36" fill="#2A9D6E" opacity="0.25" font-weight="bold">A</text>
  <text x="390" y="260" font-family="Georgia, serif" font-size="28" fill="#1A7A50" opacity="0.2" font-weight="bold">B</text>
  <text x="445" y="235" font-family="Georgia, serif" font-size="32" fill="#2A9D6E" opacity="0.2" font-weight="bold">C</text>

  <!-- Label -->
  <text x="300" y="348" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A6B4A" text-anchor="middle" opacity="0.9">Langage oral</text>
</svg>

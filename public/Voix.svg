<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bgVoix" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4FF"/>
      <stop offset="100%" style="stop-color:#DDE8FF"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9EFF"/>
      <stop offset="100%" style="stop-color:#2E7CE6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bgVoix)"/>
  <circle cx="80" cy="80" r="75" fill="#2E7CE6" opacity="0.06"/>
  <circle cx="540" cy="310" r="80" fill="#2E7CE6" opacity="0.06"/>

  <!-- Microphone -->
  <rect x="218" y="100" width="64" height="110" rx="32" fill="url(#micGrad)" stroke="#1A5CB0" stroke-width="2"/>
  <!-- Mic grille lines -->
  <path d="M220,135 Q250,128 280,135" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <path d="M218,150 Q250,142 282,150" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <path d="M218,165 Q250,157 282,165" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <path d="M218,180 Q250,172 282,180" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <path d="M220,195 Q250,187 280,195" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Mic stand -->
  <path d="M190,195 Q195,230 250,235 Q305,230 310,195" fill="none" stroke="#2E7CE6" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="244" y="233" width="12" height="50" rx="6" fill="#2E7CE6" opacity="0.8"/>
  <rect x="214" y="280" width="72" height="10" rx="5" fill="#2E7CE6" opacity="0.6"/>

  <!-- Sound waves radiating out -->
  <path d="M315,155 Q335,140 335,175 Q335,210 315,195" fill="none" stroke="#2E7CE6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M335,140 Q365,130 365,175 Q365,220 335,210" fill="none" stroke="#2E7CE6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M360,125 Q400,115 400,175 Q400,235 360,225" fill="none" stroke="#2E7CE6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M185,155 Q165,140 165,175 Q165,210 185,195" fill="none" stroke="#2E7CE6" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M165,140 Q135,130 135,175 Q135,220 165,210" fill="none" stroke="#2E7CE6" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M140,125 Q100,115 100,175 Q100,235 140,225" fill="none" stroke="#2E7CE6" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- Musical notes floating -->
  <text x="420" y="155" font-family="serif" font-size="44" fill="#2E7CE6" opacity="0.22">♪</text>
  <text x="460" y="210" font-family="serif" font-size="36" fill="#1A5CB0" opacity="0.18">♫</text>
  <text x="100" y="290" font-family="serif" font-size="40" fill="#2E7CE6" opacity="0.18">♩</text>

  <text x="300" y="348" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A4D9A" text-anchor="middle" opacity="0.9">Voix</text>
</svg>

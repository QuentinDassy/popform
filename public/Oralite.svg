<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bgOral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <linearGradient id="babyFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0B8"/>
      <stop offset="100%" style="stop-color:#FFD090"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bgOral)"/>
  <circle cx="70" cy="70" r="70" fill="#E87B35" opacity="0.08"/>
  <circle cx="540" cy="310" r="80" fill="#E87B35" opacity="0.07"/>

  <!-- Baby head -->
  <ellipse cx="220" cy="180" rx="82" ry="92" fill="url(#babyFace)" stroke="#E8B870" stroke-width="1.5"/>
  <!-- Baby hair (just a few strands) -->
  <path d="M180,112 Q200,98 220,105 Q240,98 260,112" fill="none" stroke="#8B6020" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="170" cy="192" rx="22" ry="16" fill="#E88080" opacity="0.25"/>
  <ellipse cx="270" cy="192" rx="22" ry="16" fill="#E88080" opacity="0.25"/>
  <!-- Eyes (cute baby) -->
  <ellipse cx="196" cy="170" rx="12" ry="13" fill="white"/>
  <ellipse cx="244" cy="170" rx="12" ry="13" fill="white"/>
  <circle cx="198" cy="171" r="7" fill="#4A2800"/>
  <circle cx="246" cy="171" r="7" fill="#4A2800"/>
  <circle cx="200" cy="169" r="2.5" fill="white"/>
  <circle cx="248" cy="169" r="2.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="210" cy="192" rx="5" ry="4" fill="#E8A060" opacity="0.6"/>
  <ellipse cx="230" cy="192" rx="5" ry="4" fill="#E8A060" opacity="0.6"/>
  <!-- Big smile / mouth -->
  <path d="M192,213 Q220,235 248,213" fill="#E87B35" opacity="0.7"/>
  <path d="M193,215 Q220,228 247,215" fill="white" opacity="0.9"/>

  <!-- Spoon -->
  <ellipse cx="355" cy="165" rx="22" ry="16" fill="#E8E8E8" stroke="#C0C0C0" stroke-width="1.5"/>
  <!-- Food on spoon -->
  <ellipse cx="355" cy="163" rx="14" ry="10" fill="#E87B35" opacity="0.6"/>
  <!-- Spoon handle -->
  <rect x="350" y="178" width="9" height="75" rx="4.5" fill="#C8C8C8" stroke="#B0B0B0" stroke-width="1" transform="rotate(15 354 215)"/>

  <!-- Drops/drool -->
  <ellipse cx="300" cy="220" rx="5" ry="8" fill="#B8D8F0" opacity="0.5"/>
  <ellipse cx="312" cy="232" rx="4" ry="6" fill="#B8D8F0" opacity="0.4"/>

  <!-- Food bowl decoration -->
  <path d="M390,225 Q420,210 450,225 Q460,250 420,258 Q380,250 390,225 Z" fill="#E87B35" opacity="0.2" stroke="#E87B35" stroke-width="1.5" opacity2="0.4"/>

  <text x="300" y="348" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#9A4A0A" text-anchor="middle" opacity="0.9">Oralité</text>
</svg>

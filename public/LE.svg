<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bgLE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF2FF"/>
      <stop offset="100%" style="stop-color:#C8DAFF"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7CE6"/>
      <stop offset="100%" style="stop-color:#5B9EFF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bgLE)"/>
  <circle cx="80" cy="80" r="80" fill="#2E7CE6" opacity="0.07"/>
  <circle cx="540" cy="310" r="90" fill="#2E7CE6" opacity="0.07"/>

  <!-- Open book -->
  <path d="M160,120 Q200,110 250,118 L250,270 Q200,262 160,272 Z" fill="white" stroke="#BDD0F0" stroke-width="1.5"/>
  <path d="M250,118 Q300,110 340,120 L340,272 Q300,262 250,270 Z" fill="white" stroke="#BDD0F0" stroke-width="1.5"/>
  <!-- Book spine -->
  <rect x="248" y="118" width="4" height="152" fill="#2E7CE6" opacity="0.5" rx="2"/>
  <!-- Book cover left -->
  <path d="M155,120 Q160,110 165,118 L165,272 Q160,280 155,272 Z" fill="#2E7CE6" opacity="0.8"/>
  <!-- Book cover right -->
  <path d="M335,120 Q340,110 345,118 L345,272 Q340,280 335,272 Z" fill="#2E7CE6" opacity="0.8"/>
  <!-- Text lines on left page -->
  <rect x="178" y="148" width="58" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="178" y="163" width="50" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="178" y="178" width="55" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="178" y="193" width="45" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="178" y="208" width="52" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="178" y="223" width="40" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <!-- Text lines on right page -->
  <rect x="264" y="148" width="58" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="264" y="163" width="50" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="264" y="178" width="55" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="264" y="193" width="48" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="264" y="208" width="52" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>
  <rect x="264" y="223" width="42" height="7" rx="3.5" fill="#2E7CE6" opacity="0.25"/>

  <!-- Pencil -->
  <rect x="390" y="100" width="20" height="140" rx="4" fill="#F5B731" transform="rotate(25 400 170)"/>
  <polygon points="400,240 392,258 408,258" fill="#F5B731" transform="rotate(25 400 250)"/>
  <polygon points="400,253 392,258 408,258" fill="#F5C8C8" transform="rotate(25 400 255)"/>
  <rect x="390" y="100" width="20" height="15" rx="3" fill="#C0A0A0" transform="rotate(25 400 107)"/>

  <!-- Flying letters -->
  <text x="420" y="160" font-family="Georgia, serif" font-size="40" fill="#2E7CE6" opacity="0.18" font-weight="bold" transform="rotate(-10 440 160)">A</text>
  <text x="470" y="200" font-family="Georgia, serif" font-size="30" fill="#1A5CB0" opacity="0.18" font-weight="bold" transform="rotate(8 485 200)">b</text>
  <text x="510" y="155" font-family="Georgia, serif" font-size="35" fill="#2E7CE6" opacity="0.15" font-weight="bold" transform="rotate(-5 527 155)">c</text>

  <!-- Label -->
  <text x="300" y="348" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1A4D9A" text-anchor="middle" opacity="0.9">Langage écrit</text>
</svg>

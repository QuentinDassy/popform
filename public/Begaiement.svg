<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bgBeg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E8"/>
      <stop offset="100%" style="stop-color:#FFE8B0"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066"/>
      <stop offset="100%" style="stop-color:#F5B731"/>
    </linearGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bgBeg)"/>
  <circle cx="80" cy="80" r="70" fill="#F5B731" opacity="0.08"/>
  <circle cx="530" cy="310" r="80" fill="#F5B731" opacity="0.07"/>

  <!-- Speech bubble 1 (full, fluent) -->
  <rect x="80" y="85" width="175" height="95" rx="18" fill="url(#bubble1)" opacity="0.9"/>
  <polygon points="130,180 108,212 162,180" fill="url(#bubble1)" opacity="0.9"/>
  <!-- Lines fluent -->
  <rect x="105" y="112" width="125" height="10" rx="5" fill="white" opacity="0.65"/>
  <rect x="105" y="132" width="100" height="10" rx="5" fill="white" opacity="0.65"/>
  <rect x="105" y="152" width="115" height="10" rx="5" fill="white" opacity="0.65"/>

  <!-- Speech bubble 2 (hesitating — interrupted lines) -->
  <rect x="110" y="240" width="175" height="70" rx="18" fill="#F5B731" opacity="0.55"/>
  <polygon points="165,310 143,338 195,310" fill="#F5B731" opacity="0.55"/>
  <!-- Lines hesitant (broken) -->
  <rect x="135" y="258" width="35" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="178" y="258" width="10" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="196" y="258" width="10" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="215" y="258" width="30" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="135" y="278" width="55" height="9" rx="4.5" fill="white" opacity="0.6"/>
  <rect x="200" y="278" width="30" height="9" rx="4.5" fill="white" opacity="0.4"/>

  <!-- Arrow flow left → right (fluency arrow) -->
  <path d="M280,190 Q360,175 420,190 Q480,205 520,185" fill="none" stroke="#D49A1A" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <polygon points="520,185 507,178 513,194" fill="#D49A1A" opacity="0.6"/>

  <!-- Sound waves (rightmost, flowing) -->
  <path d="M330,145 Q350,132 370,145 Q390,158 410,145" fill="none" stroke="#F5B731" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M330,165 Q360,148 390,165 Q420,182 450,165" fill="none" stroke="#F5B731" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M330,185 Q370,165 410,185 Q450,205 490,185" fill="none" stroke="#F5B731" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <text x="300" y="348" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#8B6A00" text-anchor="middle" opacity="0.9">Bégaiement</text>
</svg>

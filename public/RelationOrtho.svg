<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgRO" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDFAF3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4F0E4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgRO)" rx="20"/>
  <!-- Decorative circles -->
  <circle cx="70" cy="70" r="70" fill="#2A9D6E" opacity="0.07"/>
  <circle cx="530" cy="330" r="90" fill="#2A9D6E" opacity="0.06"/>
  <!-- Speech bubble 1 (left, clinician) -->
  <rect x="80" y="110" width="210" height="130" rx="20" ry="20" fill="#2A9D6E" opacity="0.85"/>
  <polygon points="120,240 100,275 155,240" fill="#2A9D6E" opacity="0.85"/>
  <!-- Lines inside bubble 1 -->
  <rect x="105" y="138" width="160" height="12" rx="6" fill="white" opacity="0.6"/>
  <rect x="105" y="162" width="130" height="12" rx="6" fill="white" opacity="0.6"/>
  <rect x="105" y="186" width="145" height="12" rx="6" fill="white" opacity="0.6"/>
  <rect x="105" y="210" width="100" height="12" rx="6" fill="white" opacity="0.6"/>
  <!-- Speech bubble 2 (right, patient) -->
  <rect x="310" y="145" width="210" height="110" rx="20" ry="20" fill="#F5B731" opacity="0.75"/>
  <polygon points="480,255 500,285 445,255" fill="#F5B731" opacity="0.75"/>
  <!-- Lines inside bubble 2 -->
  <rect x="335" y="170" width="140" height="11" rx="5.5" fill="white" opacity="0.65"/>
  <rect x="335" y="192" width="110" height="11" rx="5.5" fill="white" opacity="0.65"/>
  <rect x="335" y="214" width="130" height="11" rx="5.5" fill="white" opacity="0.65"/>
  <!-- Heart connecting them -->
  <path d="M290,185 C290,175 300,168 308,175 C316,168 326,175 326,185 C326,195 308,210 308,210 C308,210 290,195 290,185 Z" fill="#D42B2B" opacity="0.5"/>
  <!-- Label -->
  <text x="300" y="338" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1A6B4A" text-anchor="middle" opacity="0.9">Relation orthophonique</text>
</svg>
